<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, G1FlagshipOverview, G2Formation, G3PillStates, GroupGPrototype } = window;

const App = () => (
  <DesignCanvas
    title="GROUP G — GAMEDAY Flagship · AVANTI Pill + Formation View"
    subtitle="Concept 1: large floating AVANTI pill replaces support widget · Concept 2: depth-chart formation view under Club OS"
    defaultZoom={0.45}

    <DCSection id="proto" title="Interactive Prototype — switch concepts">

        <GroupGPrototype />
      </DCArtboard>
    </DCSection>

    <DCSection id="g1" title="G1 — AVANTI Flagship Floating Pill (replaces small green circle)">

        <G1FlagshipOverview />
      </DCArtboard>
      <DCArtboard id="G1b" label="G1b — Pill states · IDLE vs ACTIVE side-by-side" width={1440} height={900}>
        <G3PillStates />
      </DCArtboard>

    <DCSection id="g2" title="G2 — Formation / Depth Chart View (new sidebar item under Club OS)">

        <G2Formation />
      </DCArtboard>
    </DCSection>
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
